<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throttlestop ⏱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="project.css" />
    <link rel="icon" type="image/x-icon" href="throttlestop.ico">

</head>
<body>
    <header class="header">
        <a href="https://utilityman123.github.io/" class="home-btn">Home</a>
        <h1 class="title">Tool-6</h1>
        <p class="subtitle">Throttlestop</p>
    </header>

    <section class="project-window">
        <hr>
        <div class="project-card">
            <h2 class="project-heading">About</h2>
            <p>
                Throttlestop allows you to optimise thermal management of cpu, reduce power comsumption and enhance system performance. Use at your own risk.
            </p>
        </div>

            <div class="download-box">
             <a href="https://drive.google.com/uc?export=download&id=1NMaEBzKbQ_wxZPa3YmUyx72lifar6G8x" download target="_blank" class="download-btn">Download</a>
            </div>
    </section>
    
<!-- Javascript -->
<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme');

    // 1. Check saved theme on load
    if (currentTheme) {
        document.documentElement.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark') {
            toggleBtn.textContent = "☀️ Light Mode";
        }
    }

    // 2. Toggle logic
    toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            toggleBtn.textContent = "🌙 Dark Mode";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            toggleBtn.textContent = "☀️ Light Mode";
        }
    });
</script>
    
</body>
</html>
